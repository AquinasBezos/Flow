<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Potential Flow Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar Toggle Button -->
    <button id="sidebar-toggle" class="pixel-btn" aria-label="Toggle Sidebar">&gt;</button>

    <!-- Left Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1>FLOW_SIM_2D</h1>
        <p class="subtitle">POTENTIAL FLOW SOLVER</p>
      </div>

      <div class="sidebar-content">
        <!-- Section A: Display Options -->
        <section class="control-section">
          <h2>DISPLAY OPTIONS</h2>
          
          <div class="control-group">
            <label class="checkbox-container">
              <input type="checkbox" id="toggle-stream" checked>
              <span class="custom-checkbox"></span>
              STREAMFUNCTIONS (&psi;)
            </label>
            <div class="sub-inputs" id="stream-inputs">
              <div class="input-row">
                <label for="stream-offset">OFFSET:</label>
                <input type="number" id="stream-offset" value="0" step="0.5">
              </div>
              <div class="input-row">
                <label for="stream-spacing">SPACING:</label>
                <input type="number" id="stream-spacing" value="1" step="0.1" min="0.01">
              </div>
            </div>
          </div>

          <hr class="pixel-hr">

          <div class="control-group">
            <label class="checkbox-container">
              <input type="checkbox" id="toggle-potential">
              <span class="custom-checkbox"></span>
              COMPLEX POTENTIALS (&phi;)
            </label>
            <div class="sub-inputs" id="potential-inputs" style="display: none;">
              <div class="input-row">
                <label for="potential-offset">OFFSET:</label>
                <input type="number" id="potential-offset" value="0" step="0.5">
              </div>
              <div class="input-row">
                <label for="potential-spacing">SPACING:</label>
                <input type="number" id="potential-spacing" value="1" step="0.1" min="0.01">
              </div>
            </div>
          </div>

          <hr class="pixel-hr">

          <div class="control-group">
            <label class="checkbox-container">
              <input type="checkbox" id="toggle-vectors" checked>
              <span class="custom-checkbox"></span>
              VELOCITY VECTORS
            </label>
            <div class="sub-inputs" id="vector-inputs">
              <div class="input-row">
                <label for="vector-grid">GRID SPACING:</label>
                <input type="number" id="vector-grid" value="30" step="5" min="10">
              </div>
              <div class="input-row">
                <label for="vector-scale">ARROW SCALE:</label>
                <input type="number" id="vector-scale" value="1.0" step="0.1" min="0.05">
              </div>
            </div>
          </div>

          <hr class="pixel-hr">

          <div class="control-group">
            <label class="checkbox-container">
              <input type="checkbox" id="toggle-stagnation" checked>
              <span class="custom-checkbox"></span>
              STAGNATION POINTS
            </label>
            <div class="sub-inputs" id="stagnation-inputs">
              <div class="input-row">
                <label>COLOR:</label>
                <div class="radio-group">
                  <label class="radio-container">
                    <input type="radio" name="stagnation-color" value="red" checked>
                    <span class="custom-radio"></span>
                    RED
                  </label>
                  <label class="radio-container">
                    <input type="radio" name="stagnation-color" value="black">
                    <span class="custom-radio"></span>
                    BLACK
                  </label>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Section B: Global Flow Variables -->
        <section class="control-section">
          <h2>GLOBAL VARIABLES</h2>
          <div class="input-row">
            <label for="global-u">UNIFORM FLOW (U):</label>
            <input type="number" id="global-u" value="1.0" step="0.1">
          </div>
          <div class="input-row">
            <label for="global-alpha">ANGLE (DEG):</label>
            <input type="number" id="global-alpha" value="0" step="5" min="-360" max="360">
          </div>
        </section>

        <!-- Section B.2: Fluid Properties -->
        <section class="control-section">
          <h2>FLUID PROPERTIES</h2>
          <div class="input-row">
            <label for="fluid-density">DENSITY (&rho;):</label>
            <input type="number" id="fluid-density" value="1.225" step="0.01" min="0.001">
          </div>
        </section>

        <!-- Section B.3: Cursor Dynamics -->
        <section class="control-section">
          <h2>CURSOR DYNAMICS</h2>
          <div class="readout-box" id="cursor-readout">
            <div class="readout-row">
              <span class="readout-label">POS X:</span>
              <span class="readout-val" id="readout-x">---</span>
            </div>
            <div class="readout-row">
              <span class="readout-label">POS Y:</span>
              <span class="readout-val" id="readout-y">---</span>
            </div>
            <div class="readout-row">
              <span class="readout-label">VEL (V):</span>
              <span class="readout-val" id="readout-vel">--- m/s</span>
            </div>
            <div class="readout-row">
              <span class="readout-label">DP (p-p_inf):</span>
              <span class="readout-val" id="readout-dp">--- Pa</span>
            </div>
          </div>
        </section>

        <!-- Section C: Element List -->
        <section class="control-section">
          <h2>FLOW ELEMENTS</h2>
          <div id="element-list" class="element-list">
            <!-- Dynamic elements will be inserted here -->
          </div>
          
          <div class="add-controls">
            <label for="element-type-select">ADD ELEMENT:</label>
            <div class="add-row">
              <select id="element-type-select" class="pixel-select">
                <option value="source">SOURCE (+m)</option>
                <option value="sink">SINK (-m)</option>
                <option value="vortex">VORTEX (&Gamma;)</option>
                <option value="doublet">DOUBLET (&mu;)</option>
              </select>
              <button id="add-element-btn" class="pixel-btn">ADD</button>
            </div>
          </div>
        </section>

        <!-- Section D: System Configuration -->
        <section class="control-section">
          <h2>SYSTEM CONFIG</h2>
          <div class="system-actions">
            <button id="save-config-btn" class="pixel-btn full-width-btn">SAVE CONFIG</button>
            <label for="load-config-input" class="pixel-btn-label">
              LOAD CONFIG
              <input type="file" id="load-config-input" accept=".json" style="display: none;">
            </label>
          </div>
        </section>
      </div>

      <div class="sidebar-footer">
        <p>DOUBLE-CLICK CANVAS TO ADD ELEMENT</p>
        <p>SPACE+DRAG TO PAN</p>
        <p>SCROLL TO ZOOM</p>
      </div>
    </aside>

    <!-- Canvas Area -->
    <main id="canvas-container">
      <canvas id="flow-canvas"></canvas>
    </main>

    <!-- Zoom Controls in Bottom Right -->
    <div id="zoom-controls">
      <button id="zoom-in" class="pixel-btn" title="Zoom In">+</button>
      <button id="zoom-out" class="pixel-btn" title="Zoom Out">-</button>
      <button id="zoom-reset" class="pixel-btn" title="Reset View">R</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
